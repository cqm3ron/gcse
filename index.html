<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCSE Resources</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f7fb;
      color: #333;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    header p {
      margin-top: 10px;
      opacity: 0.9;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 0.95em;
      color: #666;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>

<body>

  <header>
    <h1>GCSE Resources</h1>
    <p>Free notes, guides, and past papers</p>
  </header>

  <div class="container">
    <div class="grid">

      <a href="subjects/maths.html" class="card">
        <h2>📘 Maths</h2>
        <p>Revision notes, practice questions, and past papers.</p>
      </a>

      <a href="subjects/physics.html" class="card">
        <h2>⚡ Physics</h2>
        <p>Key concepts, formulas, and exam prep materials.</p>
      </a>

      <a href="subjects/compsci.html" class="card">
        <h2>💻 Computer Science</h2>
        <p>Programming, theory, and revision resources.</p>
      </a>

    </div>
  </div>

  <footer>
    <p>Made for students • Free to use</p>
  </footer>

</body>
</html>
